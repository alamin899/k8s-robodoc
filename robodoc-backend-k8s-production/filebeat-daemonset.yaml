---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: robodoc
  labels:
    app: filebeat

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
  labels:
    app: filebeat
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - nodes
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs: ["get", "watch", "list"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: robodoc
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: robodoc
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        - name: filebeat
          # Same version as your existing Docker-based Filebeat
          image: docker.elastic.co/beats/filebeat:7.17.13
          args:
            - "-c"
            - "/usr/share/filebeat/filebeat.yml"
            - "-e"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Pulled from the existing robodoc-backend-production ConfigMap
            - name: ELASTICSEARCH_HOST
              valueFrom:
                configMapKeyRef:
                  name: robodoc-backend-production
                  key: ELASTICSEARCH_HOST
            - name: ELASTICSEARCH_PORT
              valueFrom:
                configMapKeyRef:
                  name: robodoc-backend-production
                  key: ELASTICSEARCH_PORT
            - name: ELASTICSEARCH_USER
              valueFrom:
                configMapKeyRef:
                  name: robodoc-backend-production
                  key: ELASTICSEARCH_USER
            # Pulled from the existing robodoc-backend-production Secret
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: robodoc-backend-production
                  key: ELASTICSEARCH_PASSWORD
          securityContext:
            runAsUser: 0
            privileged: false
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 5066
              name: metrics
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: data
              mountPath: /usr/share/filebeat/data

      volumes:
        - name: config
          configMap:
            name: filebeat-config
            defaultMode: 0640
        # Symlink source — /var/log/containers/*.log points here
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
            type: DirectoryOrCreate
        # Symlink target — /var/log/containers/*.log -> /var/log/pods/...
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        # Actual log content (containerd stores logs here)
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
        # Persists Filebeat registry (read offset state) across pod restarts
        - name: data
          hostPath:
            path: /var/lib/filebeat-data
            type: DirectoryOrCreate
