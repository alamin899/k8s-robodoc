apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: robodoc-backend-prod
  namespace: robodoc
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: robodoc-backend-prod
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: robodoc-backend-prod
    namespace: robodoc
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: robodoc-backend-prod
  namespace: robodoc
spec:
  gatewayClassName: robodoc-backend-prod
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: robodoc-backend-prod
  namespace: robodoc
spec:
  parentRefs:
    - name: robodoc-backend-prod
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        # End-to-end deadline — client gets a 504 if exceeded
        request: 60s
        # Per-attempt deadline — slightly less than request to allow retry logic
        backendRequest: 55s
      backendRefs:
        - name: robodoc-backend-production
          port: 80
          namespace: robodoc
